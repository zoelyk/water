<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>micro:bit 水位監測與控制台</title>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&f[]=cabinet-grotesk@500,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root,[data-theme="light"]{--text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);--text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);--text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;--color-border:#d4d1ca;--color-text:#28251d;--color-text-muted:#66655f;--color-text-inverse:#f9f8f4;--color-primary:#01696f;--color-primary-hover:#0c4e54;--color-success:#437a22;--color-success-hover:#36631b;--color-warning:#964219;--color-error:#a13544;--color-blue:#006494;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;--shadow-sm:0 1px 2px oklch(0.2 0.01 80 / .06);--font-display:'Cabinet Grotesk','Noto Sans TC',sans-serif;--font-body:'General Sans','Noto Sans TC',sans-serif}
    [data-theme="dark"]{--color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;--color-surface-offset:#22211f;--color-border:#393836;--color-text:#e3e0d8;--color-text-muted:#b1aea6;--color-text-inverse:#171614;--color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-success:#6daa45;--color-warning:#bb653b;--color-error:#dd6974;--color-blue:#5591c7}
    *,*:before,*:after{box-sizing:border-box;margin:0;padding:0} html{-webkit-text-size-adjust:none;text-size-adjust:none} body{min-height:100dvh;background:var(--color-bg);color:var(--color-text);font:var(--text-base)/1.6 var(--font-body)} button,input,textarea,select{font:inherit;color:inherit} button{cursor:pointer;border:none} .shell{max-width:1160px;margin:auto;padding:var(--space-4)} .topbar{display:flex;justify-content:space-between;align-items:center;gap:var(--space-4);padding:var(--space-4) 0 var(--space-6)} .brand{display:flex;align-items:center;gap:var(--space-3)} .logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--color-primary),var(--color-blue));display:grid;place-items:center;color:white} h1{font:700 var(--text-xl)/1.08 var(--font-display)} .sub{color:var(--color-text-muted);font-size:var(--text-sm);max-width:62ch} .theme-toggle{min-width:44px;min-height:44px;border-radius:var(--radius-full);background:var(--color-surface);border:1px solid var(--color-border)} .panel{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);box-shadow:var(--shadow-sm);margin-bottom:var(--space-4)} .panel h2{font:600 var(--text-lg)/1.1 var(--font-display);margin-bottom:var(--space-3)} .panel p{color:var(--color-text-muted);font-size:var(--text-sm)} .btns{display:flex;flex-wrap:wrap;gap:var(--space-3);margin-top:var(--space-4)} .btn{min-height:44px;padding:.8rem 1.2rem;border-radius:var(--radius-md);background:var(--color-surface-offset);border:1px solid var(--color-border);transition:0.2s} .btn.primary{background:var(--color-primary);color:var(--color-text-inverse);border-color:transparent} .btn.primary:hover{background:var(--color-primary-hover)} .btn.success{background:var(--color-success);color:var(--color-text-inverse);border-color:transparent} .btn.success:hover{background:var(--color-success-hover)} .btn.warn{background:var(--color-warning);color:var(--color-text-inverse);border-color:transparent} .status{margin-top:var(--space-4);padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);background:var(--color-surface-offset);font-size:var(--text-sm);border:1px solid var(--color-border)} .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-3);margin-top:var(--space-4)} .metric{background:var(--color-surface-offset);border-radius:var(--radius-lg);padding:var(--space-4);border:1px solid color-mix(in oklab,var(--color-text) 10%, transparent)} .metric .k{font-size:var(--text-xs);color:var(--color-text-muted)} .metric .v{font:700 var(--text-lg)/1.1 var(--font-display);margin-top:var(--space-2)} .chart-wrap{background:var(--color-surface-2);padding:var(--space-4);border-radius:var(--radius-lg);margin-top:var(--space-4);height:300px} .grid{display:grid;gap:var(--space-4)} @media (min-width:980px){.grid{grid-template-columns:1fr 1fr}} label{font-size:var(--text-sm);font-weight:600;display:block;margin-bottom:var(--space-2)} input,textarea,select{width:100%;padding:.8rem .95rem;border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface-2)} textarea{min-height:96px;resize:vertical} .row{display:grid;gap:var(--space-3)} @media (min-width:640px){.row.two{grid-template-columns:1fr 1fr}} .pill{display:inline-block;padding:.4rem .75rem;border-radius:var(--radius-full);background:color-mix(in oklab,var(--color-primary) 12%, var(--color-surface-2));font-size:var(--text-xs)} .log{max-height:220px;overflow:auto;background:var(--color-surface-2);border-radius:var(--radius-lg);padding:var(--space-4);border:1px solid var(--color-border);font-size:var(--text-sm)} .log li{margin-left:1.1rem;margin-bottom:.45rem} :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">水</div>
        <div>
          <h1>micro:bit 水位監測控制台</h1>
          <p class="sub">此版本支援語音警報與遠端水泵指令傳送。</p>
        </div>
      </div>
      <button class="theme-toggle" data-theme-toggle aria-label="切換主題">月</button>
    </header>

    <div class="grid">
      <section class="panel">
        <h2>Serial 連線與控制</h2>
        <div class="btns">
          <button class="btn primary" id="connectBtn">連接 Serial</button>
          <button class="btn" id="disconnectBtn">中斷連線</button>
        </div>
        <div class="status" id="status">尚未連線。</div>
        
        <div style="margin-top: 1.5rem;">
          <label>遠端控制水泵 (傳送指令)</label>
          <div class="btns">
            <button class="btn success" id="pumpOnBtn">開啟水泵 (PUMP_ON)</button>
            <button class="btn warn" id="pumpOffBtn">關閉水泵 (PUMP_OFF)</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>即時數值</h2>
        <div class="metrics">
          <div class="metric"><div class="k">目前水位</div><div class="v" id="currentValue">--</div></div>
          <div class="metric"><div class="k">低水位門檻</div><div class="v" id="lowValueShow">300</div></div>
          <div class="metric"><div class="k">高水位門檻</div><div class="v" id="highValueShow">700</div></div>
        </div>
        <div class="chart-wrap"><canvas id="levelChart"></canvas></div>
      </section>
    </div>

    <div class="grid">
      <section class="panel">
        <h2>語音提示設定</h2>
        <p>水位觸發門檻時自動播放，或手動點擊測試。</p>
        <div class="row two">
          <div>
            <label for="lowThreshold">低水位門檻</label>
            <input type="number" id="lowThreshold" value="300" min="0" max="1023" />
          </div>
          <div>
            <label for="highThreshold">高水位門檻</label>
            <input type="number" id="highThreshold" value="700" min="0" max="1023" />
          </div>
        </div>
        <div class="row" style="margin-top:1rem;">
          <div>
            <label for="lowText">低水位語音內容</label>
            <textarea id="lowText">警告，水位過低，請補充水量。</textarea>
          </div>
          <div>
            <label for="highText">高水位語音內容</label>
            <textarea id="highText">水位已足夠。</textarea>
          </div>
        </div>
        <div class="btns">
          <button class="btn" id="speakTestBtn">📢 播放語音測試</button>
        </div>
      </section>

      <section class="panel">
        <h2>通訊日誌</h2>
        <p>收到的原始資料與系統訊息。</p>
        <div class="log">
          <ol id="logList"></ol>
        </div>
      </section>
    </div>
  </div>

  <script>
    let port = null;
    let reader = null;
    let writer = null;
    let keepReading = false;
    let currentValue = null;
    let serialBuffer = '';
    let lastSpokenType = null;
    let lastSpokenTime = 0;
    const labels = [];
    const dataPoints = [];

    const statusEl = document.getElementById('status');
    const currentValueEl = document.getElementById('currentValue');
    const lowThresholdEl = document.getElementById('lowThreshold');
    const highThresholdEl = document.getElementById('highThreshold');
    const lowValueShow = document.getElementById('lowValueShow');
    const highValueShow = document.getElementById('highValueShow');
    const logList = document.getElementById('logList');

    function getCss(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    
    const chart = new Chart(document.getElementById('levelChart'), {
      type: 'line',
      data: { labels, datasets: [{ label:'水位值', data:dataPoints, borderColor:getCss('--color-primary'), backgroundColor:'rgba(1,105,111,.14)', fill:true, tension:.25, pointRadius:0 }] },
      options: { responsive:true, maintainAspectRatio:false, animation:false, plugins:{ legend:{ display: false } }, scales:{ x:{ display: false }, y:{ min:0, max:1023, ticks:{ color:getCss('--color-text-muted') } } } }
    });

    function setStatus(msg, kind=''){ statusEl.textContent = msg; statusEl.style.borderColor = kind === 'err' ? getCss('--color-error') : getCss('--color-border'); }
    function log(msg){ const li = document.createElement('li'); li.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`; logList.prepend(li); while(logList.children.length > 30) logList.removeChild(logList.lastChild); }
    function updateThresholdLabels(){ lowValueShow.textContent = lowThresholdEl.value; highValueShow.textContent = highThresholdEl.value; }
    
    function addPoint(value){ 
      labels.push(new Date().toLocaleTimeString()); 
      dataPoints.push(value); 
      if(labels.length > 40){ labels.shift(); dataPoints.shift(); } 
      currentValue = value; 
      currentValueEl.textContent = value; 
      chart.update(); 
      checkSpeech(value); 
    }

    function speak(text){ 
      if(!text.trim()) return; 
      const utter = new SpeechSynthesisUtterance(text.trim()); 
      speechSynthesis.cancel(); 
      speechSynthesis.speak(utter); 
    }

    function checkSpeech(value){ 
      const low = Number(lowThresholdEl.value), high = Number(highThresholdEl.value), now = Date.now(); 
      if(now - lastSpokenTime < 10000) return; // 10秒內不重複播放
      if(value < low && lastSpokenType !== 'low'){ 
        speak(document.getElementById('lowText').value); 
        lastSpokenType = 'low'; lastSpokenTime = now; 
      } else if(value > high && lastSpokenType !== 'high'){ 
        speak(document.getElementById('highText').value); 
        lastSpokenType = 'high'; lastSpokenTime = now; 
      } else if(value >= low && value <= high){ 
        lastSpokenType = 'normal'; 
      } 
    }

    // 傳送指令給 micro:bit
    async function sendCommand(cmd) {
      if (!port || !port.writable) {
        alert("請先連接 Serial 裝置！");
        return;
      }
      const encoder = new TextEncoder();
      const writer = port.writable.getWriter();
      await writer.write(encoder.encode(cmd + "\n"));
      writer.releaseLock();
      log(`發送指令: ${cmd}`);
    }

    async function connectSerial(){
      try{
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 115200 });
        keepReading = true;
        setStatus('已連接 Serial 裝置。');
        log('Serial 已連線');
        readLoop();
      }catch(err){
        setStatus('連線失敗：' + err.message, 'err');
      }
    }

    async function readLoop(){
      const decoder = new TextDecoderStream();
      port.readable.pipeTo(decoder.writable).catch(() => {});
      reader = decoder.readable.getReader();
      while(keepReading){
        const { value, done } = await reader.read();
        if(done) break;
        if(value){
          serialBuffer += value;
          const parts = serialBuffer.split(/\r?\n/);
          serialBuffer = parts.pop();
          parts.forEach(line => {
            const clean = line.trim();
            if(!clean) return;
            log('收到：' + clean);
            const match = clean.match(/^water\s*:?\s*(-?\d+)/i) || clean.match(/^LEVEL\s*:?\s*(-?\d+)/i) || clean.match(/^(-?\d+)$/);
            if(match){
              const v = Number(match[1] || match[0]);
              if(Number.isFinite(v)) addPoint(v);
            }
          });
        }
      }
    }

    async function disconnectSerial(){
      keepReading = false;
      if(reader) await reader.cancel();
      if(port) await port.close();
      setStatus('已中斷連線。');
      log('Serial 已中斷');
    }

    // 事件監聽
    document.getElementById('connectBtn').addEventListener('click', connectSerial);
    document.getElementById('disconnectBtn').addEventListener('click', disconnectSerial);
    document.getElementById('pumpOnBtn').addEventListener('click', () => sendCommand('PUMP_ON'));
    document.getElementById('pumpOffBtn').addEventListener('click', () => sendCommand('PUMP_OFF'));
    document.getElementById('speakTestBtn').addEventListener('click', () => {
        const val = currentValue || 500;
        const low = Number(lowThresholdEl.value);
        const high = Number(highThresholdEl.value);
        if(val < low) speak(document.getElementById('lowText').value);
        else if(val > high) speak(document.getElementById('highText').value);
        else speak("目前水位正常，測試完畢。");
    });
    
    lowThresholdEl.addEventListener('input', updateThresholdLabels);
    highThresholdEl.addEventListener('input', updateThresholdLabels);
    
    document.querySelector('[data-theme-toggle]').addEventListener('click', () => { 
      const root = document.documentElement; 
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; 
      root.setAttribute('data-theme', next); 
      document.querySelector('[data-theme-toggle]').textContent = next === 'dark' ? '日' : '月';
      chart.options.scales.y.ticks.color = getCss('--color-text-muted');
      chart.update(); 
    });

    updateThresholdLabels();
  </script>
</body>
</html>
